<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Sun rays behind panel -->
  <g transform="translate(355, 35)">
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(0)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(30)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(60)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(90)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(120)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(150)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(180)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(210)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(240)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(270)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(300)"/>
    <polygon points="0,-30 4,-12 -4,-12" fill="#FBBF24" transform="rotate(330)"/>
    <circle cx="0" cy="0" r="16" fill="url(#sunGrad)"/>
  </g>

  <!-- Solar panel -->
  <g transform="translate(330, 10) rotate(-15)">
    <rect x="0" y="0" width="50" height="50" rx="2" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1"/>
    <line x1="17" y1="0" x2="17" y2="50" stroke="#1E3A8A" stroke-width="1"/>
    <line x1="33" y1="0" x2="33" y2="50" stroke="#1E3A8A" stroke-width="1"/>
    <line x1="0" y1="17" x2="50" y2="17" stroke="#1E3A8A" stroke-width="1"/>
    <line x1="0" y1="33" x2="50" y2="33" stroke="#1E3A8A" stroke-width="1"/>
    <rect x="2" y="2" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.9"/>
    <rect x="18" y="2" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.8"/>
    <rect x="34" y="2" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.9"/>
    <rect x="2" y="18" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.8"/>
    <rect x="18" y="18" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.9"/>
    <rect x="34" y="18" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.8"/>
    <rect x="2" y="34" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.9"/>
    <rect x="18" y="34" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.8"/>
    <rect x="34" y="34" width="14" height="14" rx="1" fill="url(#panelGrad)" opacity="0.9"/>
  </g>

  <!-- "First Front" text -->
  <text x="5" y="68" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="56" fill="#1E40AF" letter-spacing="-1">
    First Fr
  </text>

  <!-- Sun replacing 'o' -->
  <g transform="translate(248, 52)">
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(0)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(45)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(90)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(135)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(180)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(225)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(270)"/>
    <polygon points="0,-20 3,-8 -3,-8" fill="#FBBF24" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="11" fill="url(#sunGrad)"/>
  </g>

  <!-- "nt" after sun -->
  <text x="264" y="68" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="56" fill="#1E40AF" letter-spacing="-1">
    nt
  </text>

  <!-- Orange line -->
  <rect x="5" y="82" width="265" height="3" rx="1.5" fill="#F59E0B"/>

  <!-- "SOLAR ENERGY" text -->
  <text x="105" y="108" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="28" fill="#F59E0B" letter-spacing="3">
    SOLAR ENERGY
  </text>
</svg>
